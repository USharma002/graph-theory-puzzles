<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Lightning Pathfinder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --ui-bg: rgba(10, 5, 5, 0.85);
            --primary: #ffaa00;
            --accent: #ffee55;
            --text: #ffeedd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050101; }

        #map { width: 100%; height: 100%; background-color: #4e1111; z-index: 1; }

        /* --- BASE MAP STYLING --- */
        .map-tiles {
            filter: sepia(1) hue-rotate(-45deg) saturate(2.5) brightness(1.45) contrast(1.3) !important;
            transition: filter 0.2s ease-out; 
        }

        .map-found-state .map-tiles {
            filter: sepia(1) hue-rotate(240deg) saturate(1.8) brightness(1.25) contrast(1.2) !important;
        }

        /* --- UI PANEL --- */
        #ui-container {
            position: absolute; bottom: 30px; left: 30px; z-index: 10;
            background: var(--ui-bg); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 120, 0, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); color: var(--text);
            display: flex; flex-direction: column; gap: 12px; width: 340px;
        }

        .title { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); }
        .instructions { font-size: 0.85rem; color: #cc8866; margin-bottom: 5px; }
        
        .row { display: flex; gap: 10px; align-items: center; }
        
        select, button {
            width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: 600;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s;
            background: rgba(0,0,0,0.6); color: var(--text); border: 1px solid rgba(255, 120, 0, 0.3);
            outline: none;
        }
        select:focus, button:focus { border-color: var(--accent); }
        
        button.action-btn {
            background: linear-gradient(90deg, #bb3300, #ff8800); color: #fff; 
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 80, 0, 0.4); border: none;
        }
        button.action-btn:hover { background: linear-gradient(90deg, #dd4400, #ffaa00); box-shadow: 0 0 25px rgba(255, 170, 0, 0.6); transform: translateY(-2px); }
        button.clear-btn { background: transparent; border: 1px solid #553322; color: #aa6644; }
        button.clear-btn:hover { border-color: #ff3333; color: #ff3333; }

        .slider-label { font-size: 0.8rem; color: #ffaa00; font-weight: bold; width: 60px; }
        input[type=range] { width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
             height: 16px; width: 16px; border-radius: 50%;
            background: #ffea00; cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px #ffaa00;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: rgba(255, 120, 0, 0.3); border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        /* --- SCREEN FLASH OVERLAY --- */
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 40; opacity: 0; pointer-events: none; 
            background-color: #ffaa00 !important;
            will-change: opacity; 
        }

        .trigger-flash { animation: screenFlash 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }

        @keyframes screenFlash {
            0% { opacity: 0; }
            1% { opacity: 1; }   
            8% { opacity: 0.8; }  
            25% { opacity: 0.3; } 
            100% { opacity: 0; }  
        }

        /* --- MASSIVE BLOOM STRIKE & DYNAMIC SHRINKING (SVG ONLY) --- */
        .path-flash {
            stroke-dasharray: 20000; stroke-dashoffset: 20000; pointer-events: none;
            stroke-linecap: round; stroke-linejoin: round;
        }

        .path-glow-base.path-flash { animation: strikeDraw 0.85s cubic-bezier(0.1, 0.8, 0.2, 1) forwards, shrinkBase 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s forwards; }
        .path-glow-mid.path-flash  { animation: strikeDraw 0.85s cubic-bezier(0.1, 0.8, 0.2, 1) forwards, shrinkMid 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s forwards; }
        .path-glow-core.path-flash { animation: strikeDraw 0.85s cubic-bezier(0.1, 0.8, 0.2, 1) forwards, shrinkCore 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s forwards; }
        .path-center.path-flash    { animation: strikeDraw 0.85s cubic-bezier(0.1, 0.8, 0.2, 1) forwards, shrinkCenter 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s forwards; }

        @keyframes strikeDraw { to { stroke-dashoffset: 0; } }

        @keyframes shrinkBase { 0% { stroke-width: 80px; opacity: 0.7; } 100% { stroke-width: 0px; opacity: 0; } }
        @keyframes shrinkMid { 0% { stroke-width: 40px; opacity: 0.8; } 100% { stroke-width: 0px; opacity: 0; } }
        @keyframes shrinkCore { 0% { stroke-width: 12px; filter: drop-shadow(0 0 12px #ffff00); stroke: #fffb00; } 100% { stroke-width: 6px; filter: drop-shadow(0 0 4px #ffaa00); stroke: #ff8800; opacity: 0.9; } }
        @keyframes shrinkCenter { 0% { stroke-width: 4px; opacity: 1; } 100% { stroke-width: 2px; opacity: 0.9; filter: drop-shadow(0 0 2px #ffffff); } }

        .path-glow-base { stroke: rgba(255, 100, 0, 0.7); stroke-width: 80px; filter: blur(25px); }
        .path-glow-mid  { stroke: rgba(255, 150, 0, 0.8); stroke-width: 40px; filter: blur(12px) drop-shadow(0 0 15px #ffaa00); }
        .path-glow-core { stroke: #fffb00; stroke-width: 12px; filter: drop-shadow(0 0 12px #ffff00); }
        .path-center    { stroke: #ffffff; stroke-width: 4px; filter: drop-shadow(0 0 5px #ffffff); }

        .glow-marker { background: #fff; border-radius: 50%; box-shadow: 0 0 15px 4px #ff8800; }
        .start-marker { background: #fff; box-shadow: 0 0 15px 4px #00ffff; }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050101; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--primary); transition: opacity 0.5s;
        }
        .spinner {
            width: 60px; height: 60px; border: 3px solid rgba(255, 120, 0, 0.1); border-top-color: var(--primary); 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; box-shadow: 0 0 20px rgba(255, 120, 0, 0.5);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="text-shadow: 0 0 15px #ff6600; letter-spacing: 3px;">INITIALIZING GRID</h2>
    </div>

    <div id="ui-container">
        <div class="title">Neon Trace</div>
        <div class="instructions" id="status-text">Click anywhere to place START point.</div>
        
        <select id="algo-select">
            <option value="astar">A* Search (Optimal & Directed)</option>
            <option value="dijkstra">Dijkstra (Optimal & Expansive)</option>
            <option value="bfs">Breadth-First Search (Unweighted)</option>
            <option value="dfs">Depth-First Search (Deep Trace)</option>
        </select>
        
        <div class="row">
            <span class="slider-label">SPEED</span>
            <input type="range" id="speed-slider" min="1" max="100" value="50">
        </div>

        <div class="row">
            <button class="action-btn" onclick="startAlgorithm()">Initiate</button>
            <button class="clear-btn" onclick="clearVisuals()">Reset</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
class PriorityQueue {
    constructor() { this.values = []; }
    enqueue(val, priority) {
        this.values.push({val, priority});
        this.sortUp();
    }
    dequeue() {
        if (this.values.length === 0) return null;
        const min = this.values[0];
        const end = this.values.pop();
        if (this.values.length > 0) {
            this.values[0] = end;
            this.sortDown();
        }
        return min;
    }
    sortUp() {
        let idx = this.values.length - 1;
        const element = this.values[idx];
        while (idx > 0) {
            let parentIdx = Math.floor((idx - 1) / 2);
            let parent = this.values[parentIdx];
            if (element.priority >= parent.priority) break;
            this.values[parentIdx] = element;
            this.values[idx] = parent;
            idx = parentIdx;
        }
    }
    sortDown() {
        let idx = 0;
        const length = this.values.length;
        const element = this.values[0];
        while (true) {
            let leftChildIdx = 2 * idx + 1;
            let rightChildIdx = 2 * idx + 2;
            let leftChild, rightChild;
            let swap = null;

            if (leftChildIdx < length) {
                leftChild = this.values[leftChildIdx];
                if (leftChild.priority < element.priority) swap = leftChildIdx;
            }
            if (rightChildIdx < length) {
                rightChild = this.values[rightChildIdx];
                if ((swap === null && rightChild.priority < element.priority) || 
                    (swap !== null && rightChild.priority < leftChild.priority)) {
                    swap = rightChildIdx;
                }
            }
            if (swap === null) break;
            this.values[idx] = this.values[swap];
            this.values[swap] = element;
            idx = swap;
        }
    }
    isEmpty() { return this.values.length === 0; }
}

const MAP_CENTER = [13.0198, 77.5673]; 
const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView(MAP_CENTER, 15.5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap', className: 'map-tiles'
}).addTo(map);

const svgRenderer = L.svg(); 

let graph = new Map(); 
let nodesData = {};
let startNodeId = null, endNodeId = null;
let startMarker = null, endMarker = null;

let baseRoadLayer = L.layerGroup().addTo(map);
let visualLayers = L.layerGroup().addTo(map); 
let pathLayers = L.layerGroup().addTo(map);   
let activeFrontLayer = L.layerGroup().addTo(map);
let isAnimating = false;

async function fetchOSMData() {
    const bbox = "13.0120,77.5580,13.0280,77.5760"; 
    const cacheKey = `osm_data_${bbox}`; 
    const cachedData = localStorage.getItem(cacheKey);
    
    if (cachedData) {
        try { buildGraph(JSON.parse(cachedData)); return; } catch (e) { localStorage.removeItem(cacheKey); }
    }

    document.getElementById('status-text').innerText = "Downloading map network...";
    const query = `[out:json][timeout:25]; way["highway"](${bbox}); (._;>;); out body;`;
    
    try {
        const response = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: query });
        const data = await response.json();
        try { localStorage.setItem(cacheKey, JSON.stringify(data.elements)); } catch (e) {}
        buildGraph(data.elements);
    } catch (error) { alert("Failed to load map data."); }
}

function buildGraph(elements) {
    const ways = [];
    elements.forEach(el => {
        if (el.type === 'node') {
            nodesData[el.id] = { lat: el.lat, lon: el.lon };
            graph.set(el.id, { lat: el.lat, lon: el.lon, edges: [] });
        } else if (el.type === 'way' && el.nodes) {
            ways.push(el);
        }
    });

    const basePolylines = [];
    ways.forEach(way => {
        let coords = [];
        for (let i = 0; i < way.nodes.length; i++) {
            const nodeId = way.nodes[i];
            if (!nodesData[nodeId]) continue;
            
            const node = nodesData[nodeId];
            coords.push([node.lat, node.lon]);
            
            if (i > 0) {
                const prevNodeId = way.nodes[i - 1];
                const dist = getDistance(nodesData[prevNodeId].lat, nodesData[prevNodeId].lon, node.lat, node.lon);
                
                const p1 = [nodesData[prevNodeId].lat, nodesData[prevNodeId].lon];
                const p2 = [node.lat, node.lon];
                
                graph.get(prevNodeId).edges.push({ targetId: nodeId, dist: dist, coords: [p1, p2] });
                graph.get(nodeId).edges.push({ targetId: prevNodeId, dist: dist, coords: [p2, p1] });
            }
        }
        if(coords.length > 0) basePolylines.push(coords);
    });

    compressGraph();

    L.polyline(basePolylines, { color: 'rgba(255, 100, 50, 0.1)', weight: 1, smoothFactor: 2 }).addTo(baseRoadLayer);
    
    const loader = document.getElementById('loading');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 500);
}

function compressGraph() {
    for (let [nodeId, node] of graph.entries()) {
        if (node.edges.length === 2) {
            let edge1 = node.edges[0], edge2 = node.edges[1];
            let neighborA = graph.get(edge1.targetId), neighborB = graph.get(edge2.targetId);
            if (edge1.targetId === edge2.targetId) continue;
            
            neighborA.edges = neighborA.edges.filter(e => e.targetId !== nodeId);
            neighborB.edges = neighborB.edges.filter(e => e.targetId !== nodeId);
            
            let coordsAtoU = [...edge1.coords].reverse(); coordsAtoU.pop(); 
            let coordsAtoB = coordsAtoU.concat(edge2.coords); 
            let coordsBtoA = [...coordsAtoB].reverse(); 
            let newDist = edge1.dist + edge2.dist;
            
            neighborA.edges.push({ targetId: edge2.targetId, dist: newDist, coords: coordsAtoB });
            neighborB.edges.push({ targetId: edge1.targetId, dist: newDist, coords: coordsBtoA });
            graph.delete(nodeId);
        }
    }
}

map.on('click', (e) => {
    if(isAnimating) return;
    document.getElementById('map').classList.remove('map-found-state'); 
    visualLayers.clearLayers(); 
    pathLayers.clearLayers();

    const nearestId = findNearestNode(e.latlng.lat, e.latlng.lng);

    if (!startNodeId || (startNodeId && endNodeId)) {
        startNodeId = nearestId; endNodeId = null;
        if(startMarker) map.removeLayer(startMarker);
        if(endMarker) map.removeLayer(endMarker);

        const n = graph.get(startNodeId);
        startMarker = L.marker([n.lat, n.lon], { icon: L.divIcon({ className: 'glow-marker start-marker', iconSize:[8, 8] }) }).addTo(map);
        document.getElementById('status-text').innerText = "Click to place the TARGET point.";
    } 
    else if (!endNodeId) {
        endNodeId = nearestId;
        const n = graph.get(endNodeId);
        endMarker = L.marker([n.lat, n.lon], { icon: L.divIcon({ className: 'glow-marker', iconSize:[8, 8] }) }).addTo(map);
        document.getElementById('status-text').innerText = "Ready to initiate trace.";
    }
});

async function startAlgorithm() {
    if (!startNodeId || !endNodeId || isAnimating) return;
    isAnimating = true;
    document.getElementById('map').classList.remove('map-found-state');
    visualLayers.clearLayers();
    pathLayers.clearLayers();
    document.getElementById('status-text').innerText = "Searching network...";

    await new Promise(r => setTimeout(r, 10)); 

    const algo = document.getElementById('algo-select').value;
    let result;
    
    if (algo === 'astar') result = aStar(startNodeId, endNodeId);
    else if (algo === 'dijkstra') result = dijkstra(startNodeId, endNodeId);
    else if (algo === 'bfs') result = bfs(startNodeId, endNodeId);
    else result = dfs(startNodeId, endNodeId);

    if (result.continuousCoords.length === 0) {
        document.getElementById('status-text').innerText = "Target isolated. No connection found.";
        isAnimating = false; return;
    }

    document.getElementById('status-text').innerText = "Tracing connection...";
    await animateVisualization(result.visitedEdges, result.continuousCoords);
    document.getElementById('status-text').innerText = "Trace Complete.";
    isAnimating = false;
}

function dijkstra(start, target) {
    let pq = new PriorityQueue();
    pq.enqueue(start, 0);
    
    let cameFrom = new Map(), gScore = new Map();
    let visitedEdges = [];
    gScore.set(start, 0);

    while (!pq.isEmpty()) {
        let current = pq.dequeue().val;
        if (current === target) return reconstructPath(cameFrom, current, visitedEdges);

        for (let edge of graph.get(current).edges) {
            let tentative_gScore = gScore.get(current) + edge.dist;
            
            if (!gScore.has(edge.targetId) || tentative_gScore < gScore.get(edge.targetId)) {
                cameFrom.set(edge.targetId, current);
                gScore.set(edge.targetId, tentative_gScore);
                visitedEdges.push(edge.coords);
                pq.enqueue(edge.targetId, tentative_gScore);
            }
        }
    }
    return { visitedEdges: [], continuousCoords: [] };
}

function aStar(start, target) {
    let pq = new PriorityQueue();
    pq.enqueue(start, 0);
    
    let cameFrom = new Map(), gScore = new Map();
    let visitedEdges = [];
    gScore.set(start, 0);

    while (!pq.isEmpty()) {
        let current = pq.dequeue().val;
        if (current === target) return reconstructPath(cameFrom, current, visitedEdges);

        for (let edge of graph.get(current).edges) {
            let tentative_gScore = gScore.get(current) + edge.dist;
            
            if (!gScore.has(edge.targetId) || tentative_gScore < gScore.get(edge.targetId)) {
                cameFrom.set(edge.targetId, current);
                gScore.set(edge.targetId, tentative_gScore);
                visitedEdges.push(edge.coords);
                let fScore = tentative_gScore + heuristic(edge.targetId, target);
                pq.enqueue(edge.targetId, fScore);
            }
        }
    }
    return { visitedEdges: [], continuousCoords: [] };
}

function bfs(start, target) {
    let queue = [start], visited = new Set([start]), cameFrom = new Map(), visitedEdges = [];
    while (queue.length > 0) {
        let current = queue.shift();
        if (current === target) return reconstructPath(cameFrom, current, visitedEdges);

        for (let edge of graph.get(current).edges) {
            if (!visited.has(edge.targetId)) {
                visited.add(edge.targetId);
                cameFrom.set(edge.targetId, current);
                visitedEdges.push(edge.coords);
                queue.push(edge.targetId);
            }
        }
    }
    return { visitedEdges: [], continuousCoords: [] };
}

function dfs(start, target) {
    let stack = [{ id: start, parent: null }], visited = new Set(), cameFrom = new Map(), visitedEdges = [];
    while (stack.length > 0) {
        let { id: current, parent } = stack.pop();
        if (visited.has(current)) continue;
        visited.add(current);
        
        if (parent !== null) {
            cameFrom.set(current, parent);
            let edge = graph.get(parent).edges.find(e => e.targetId === current);
            visitedEdges.push(edge.coords);
        }
        if (current === target) return reconstructPath(cameFrom, current, visitedEdges);

        for (let edge of graph.get(current).edges) {
            if (!visited.has(edge.targetId)) stack.push({ id: edge.targetId, parent: current });
        }
    }
    return { visitedEdges: [], continuousCoords: [] };
}

function reconstructPath(cameFrom, current, visitedEdges) {
    let pathCoords = [];
    let curr = current;
    while (cameFrom.has(curr)) {
        let parent = cameFrom.get(curr);
        let edge = graph.get(parent).edges.find(e => e.targetId === curr);
        let coordsToAdd = [...edge.coords];
        if (pathCoords.length > 0) coordsToAdd.pop(); 
        pathCoords = coordsToAdd.concat(pathCoords);
        curr = parent;
    }
    return { visitedEdges, continuousCoords: pathCoords };
}

function heuristic(n1, n2) {
    const latDiff = graph.get(n1).lat - graph.get(n2).lat;
    const lonDiff = graph.get(n1).lon - graph.get(n2).lon;
    return Math.sqrt(latDiff * latDiff + lonDiff * lonDiff) * 111000; 
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
    const a = Math.sin((lat2-lat1)*Math.PI/360)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((lon2-lon1)*Math.PI/360)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findNearestNode(lat, lon) {
    let minDist = Infinity, nearestId = null;
    graph.forEach((data, id) => {
        const dist = getDistance(lat, lon, data.lat, data.lon);
        if (dist < minDist) { minDist = dist; nearestId = id; }
    });
    return nearestId;
}

function triggerLightningStrike(continuousCoords) {
    const flashDiv = document.getElementById('flash-overlay');
    flashDiv.classList.remove('trigger-flash'); 
    void flashDiv.offsetWidth; 
    flashDiv.classList.add('trigger-flash');

    document.getElementById('map').classList.add('map-found-state');

    L.polyline(continuousCoords, { renderer: svgRenderer, smoothFactor: 5.0, className: 'path-glow-base path-flash' }).addTo(pathLayers);
    L.polyline(continuousCoords, { renderer: svgRenderer, smoothFactor: 3.0, className: 'path-glow-mid path-flash' }).addTo(pathLayers);
    L.polyline(continuousCoords, { renderer: svgRenderer, smoothFactor: 1.5, className: 'path-glow-core path-flash' }).addTo(pathLayers);
    L.polyline(continuousCoords, { renderer: svgRenderer, smoothFactor: 0.5, className: 'path-center path-flash' }).addTo(pathLayers);
}

function animateVisualization(visitedEdges, continuousCoords) {
    return new Promise((resolve) => {
        let currentIndex = 0;
        const totalEdges = visitedEdges.length;
        
        let historyBuffer = []; 
        const maxHistory = 16; 

        function drawNextFrame() {
            const sliderVal = parseInt(document.getElementById('speed-slider').value);
            
            if (sliderVal === 100 || currentIndex >= totalEdges) {
                if (currentIndex < totalEdges) {
                    const remaining = visitedEdges.slice(currentIndex);
                    // Draw the settled path with a faint wider glow to act like glowing embers
                    L.polyline(remaining, { color: '#ff4400', weight: 6, opacity: 0.15, smoothFactor: 2.0 }).addTo(visualLayers);
                    L.polyline(remaining, { color: '#ff8800', weight: 1.5, opacity: 0.45, smoothFactor: 2.0 }).addTo(visualLayers);
                }
                
                activeFrontLayer.clearLayers(); 
                
                // NO requestAnimationFrame DELAY HERE. Flash and Strike sync perfectly.
                triggerLightningStrike(continuousCoords);
                resolve();
                return;
            }

            let batchSize = Math.max(1, Math.floor(Math.pow(sliderVal / 12, 3)));
            const batch = visitedEdges.slice(currentIndex, currentIndex + batchSize);
            
            historyBuffer.unshift(batch);
            if (historyBuffer.length > maxHistory) {
                historyBuffer.pop(); 
            }

            activeFrontLayer.clearLayers();
            
            historyBuffer.forEach((histBatch, idx) => {
                let intensity = Math.pow(1 - (idx / maxHistory), 1.5);
                
                L.polyline(histBatch, { 
                    color: '#ff5500', weight: 16 * intensity, opacity: 0.15 * intensity 
                }).addTo(activeFrontLayer);
                
                L.polyline(histBatch, { 
                    color: '#ffcc00', weight: 8 * intensity, opacity: 0.4 * intensity 
                }).addTo(activeFrontLayer);
                
                if (idx < 2) { 
                    L.polyline(histBatch, { 
                        color: '#ffffff', weight: 3 * intensity, opacity: 0.9 * intensity 
                    }).addTo(activeFrontLayer);
                }
            });
            
            // Draw the Settled Path with the dual-layer glowing embers effect
            L.polyline(batch, { color: '#ff4400', weight: 6, opacity: 0.15, smoothFactor: 2.0 }).addTo(visualLayers);
            L.polyline(batch, { color: '#ff8800', weight: 1.5, opacity: 0.45, smoothFactor: 2.0 }).addTo(visualLayers);
            
            currentIndex += batchSize;
            requestAnimationFrame(drawNextFrame); 
        }

        requestAnimationFrame(drawNextFrame);
    });
}

function clearVisuals() {
    if(isAnimating) return;
    visualLayers.clearLayers();
    activeFrontLayer.clearLayers(); 
    pathLayers.clearLayers();
    document.getElementById('map').classList.remove('map-found-state');
    startNodeId = null; endNodeId = null;
    if(startMarker) map.removeLayer(startMarker);
    if(endMarker) map.removeLayer(endMarker);
    document.getElementById('status-text').innerText = "Click to place the START point.";
}

fetchOSMData();
    </script>
</body>
