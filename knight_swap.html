<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Cycle (3×3)</title>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white:  #ffffff;
            --off:    #fafaf9;
            --black:  #111111;
            --red:    #e53935;
            --blue:   #1565c0;
            --muted:  #888888;
            --cell-light: #ffffff;
            --cell-dark:  #e8e8e8;
            --border: #cccccc;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Architects Daughter', cursive;
            background: var(--off);
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--black);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            flex-shrink: 0;
            background: var(--white);
            border-bottom: 2px solid var(--black);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 20;
        }

        .header-title {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(0.75rem, 3vw, 1rem);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--black);
        }

        .subtitle {
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            color: var(--muted);
            white-space: nowrap;
        }
        .subtitle .red  { color: var(--red); font-weight: bold; }
        .subtitle .blue { color: var(--blue); font-weight: bold; }

        .reset-btn {
            flex-shrink: 0;
            font-family: 'Architects Daughter', cursive;
            background: var(--white);
            border: 2px solid var(--black);
            color: var(--black);
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 3px 3px 0 var(--black);
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 var(--black);
        }
        .reset-btn:active {
            transform: translateY(1px);
            box-shadow: 1px 1px 0 var(--black);
        }

        /* ── TWO PANELS ── */
        .panels {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 12px;
            min-width: 0;
            min-height: 0;
        }

        .panel:first-child {
            border-right: 2px dashed var(--border);
        }

        .panel-label {
            position: absolute;
            top: 10px;
            left: 12px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--black);
            color: var(--white);
            padding: 3px 7px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 2;
        }

        /* ── CHESSBOARD ── */
        #board-stage {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            border: 3px solid var(--black);
            border-radius: 3px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.7);
            transform: rotate(-0.5deg);
            overflow: hidden;
            /* Size: fill available space keeping square */
            width: min(calc(100% - 8px), calc(100dvh - 160px) / 2 - 8px, 240px);
            aspect-ratio: 1;
        }

        @media (max-width: 600px) {
            .panels { flex-direction: column; }
            .panel:first-child { border-right: none; border-bottom: 2px dashed var(--border); }
            #board-stage {
                width: min(calc(100% - 8px), calc((100dvh - 120px) / 2 - 40px), 200px);
            }
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            font-size: 1.8em; /* scales with board size */
            transition: background 0.12s;
            border: 1px solid rgba(0,0,0,0.06);
        }
        .cell.light { background: var(--cell-light); }
        .cell.dark  { background: var(--cell-dark); }

        .cell.selected   { background: rgba(21, 101, 192, 0.25) !important; box-shadow: inset 0 0 0 3px var(--blue); }
        .cell.valid-move { background: rgba(21, 101, 192, 0.1)  !important; cursor: pointer; }
        .cell.valid-move::after {
            content: '';
            width: 32%;
            height: 32%;
            background: var(--blue);
            border-radius: 50%;
            opacity: 0.65;
            position: absolute;
        }

        /* ── CANVAS ── */
        #graphCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* ── WIN MODAL ── */
        #win-modal {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 20px;
        }
        #win-modal .win-word {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(3rem, 12vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--blue);
            text-transform: uppercase;
        }
        #win-modal .win-sub {
            font-size: 1rem;
            color: var(--muted);
        }
        #win-modal .reset-btn {
            font-size: 1rem;
            padding: 10px 28px;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-title">Knight Cycle (3×3)</div>
        <div class="subtitle">
            White → <span class="red">RED</span> nodes &nbsp;·&nbsp; Black → <span class="blue">BLUE</span> nodes
        </div>
    </div>
    <button class="reset-btn" onclick="game.reset()">Reset</button>
</div>

<div class="panels">
    <div class="panel" id="board-panel">
        <div class="panel-label">Board</div>
        <div id="board-stage"></div>
    </div>
    <div class="panel" id="graph-panel">
        <div class="panel-label">Graph</div>
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<div id="win-modal">
    <div class="win-word">Solved!</div>
    <div class="win-sub">Knights swapped successfully.</div>
    <button class="reset-btn" onclick="game.reset()">Play Again</button>
</div>

<script>
class KnightGame {
    constructor() {
        this.boardEl   = document.getElementById('board-stage');
        this.canvas    = document.getElementById('graphCanvas');
        this.ctx       = this.canvas.getContext('2d');
        this.cells     = [];
        this.grid      = new Array(9).fill(null);
        this.selectedIdx  = -1;
        this.validMoves   = [];
        this.nodes        = [];
        this.edges        = [];
        this.hoveredNodeIdx = -1;

        // White starts at top corners (0,2), should end at bottom corners (6,8)
        // Black starts at bottom corners (6,8), should end at top corners (0,2)
        this.whiteGoal = [6, 8]; // red nodes = white destination
        this.blackGoal = [0, 2]; // blue nodes = black destination

        this.colors = {
            red:  '#e53935',
            blue: '#1565c0',
            black: '#111111',
            lightGray: '#e8e8e8',
            white: '#ffffff',
        };

        this.init();
        window.addEventListener('resize', () => this.resizeCanvas());
        this.canvas.addEventListener('mousedown', e => this.handleCanvasClick(e));
        this.canvas.addEventListener('mousemove', e => this.handleCanvasHover(e));
        // Touch support for graph canvas
        this.canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0];
            this.handleCanvasClick({ clientX: t.clientX, clientY: t.clientY });
        }, { passive: false });
        this.resizeCanvas();
        this.loop();
    }

    init() {
        this.createGraphStructure();
        this.createBoard();
        this.resetPieces();
        this.initGraphNodes();
        document.getElementById('win-modal').style.display = 'none';
        this.updateVisuals(); // render pieces immediately on load
    }

    reset() {
        this.resetPieces();
        this.selectedIdx = -1;
        this.validMoves = [];
        this.hoveredNodeIdx = -1;
        this.updateVisuals();
        document.getElementById('win-modal').style.display = 'none';
    }

    createGraphStructure() {
        this.edges = [];
        for (let i = 0; i < 9; i++) {
            const x = i % 3, y = Math.floor(i / 3);
            [{ dx:1,dy:2},{dx:1,dy:-2},{dx:-1,dy:2},{dx:-1,dy:-2},
             {dx:2,dy:1},{dx:2,dy:-1},{dx:-2,dy:1},{dx:-2,dy:-1}].forEach(m => {
                const nx = x + m.dx, ny = y + m.dy;
                if (nx >= 0 && nx < 3 && ny >= 0 && ny < 3) {
                    const t = ny * 3 + nx;
                    if (i < t) this.edges.push({ source: i, target: t });
                }
            });
        }
    }

    resetPieces() {
        this.grid.fill(null);
        this.grid[0] = 'W'; this.grid[2] = 'W';
        this.grid[6] = 'B'; this.grid[8] = 'B';
    }

    getValidMoves(idx) {
        const x = idx % 3, y = Math.floor(idx / 3);
        return [{ dx:1,dy:2},{dx:1,dy:-2},{dx:-1,dy:2},{dx:-1,dy:-2},
                {dx:2,dy:1},{dx:2,dy:-1},{dx:-2,dy:1},{dx:-2,dy:-1}]
            .map(m => { const nx = x+m.dx, ny = y+m.dy; return (nx>=0&&nx<3&&ny>=0&&ny<3) ? ny*3+nx : -1; })
            .filter(t => t >= 0 && this.grid[t] === null);
    }

    handleInput(idx) {
        if (this.validMoves.includes(idx)) {
            this.grid[idx] = this.grid[this.selectedIdx];
            this.grid[this.selectedIdx] = null;
            this.selectedIdx = -1;
            this.validMoves = [];
            this.checkWin();
        } else if (this.grid[idx] !== null) {
            this.selectedIdx = idx;
            this.validMoves = this.getValidMoves(idx);
        } else {
            this.selectedIdx = -1;
            this.validMoves = [];
        }
        this.updateVisuals();
    }

    createBoard() {
        this.boardEl.innerHTML = '';
        this.cells = [];
        for (let i = 0; i < 9; i++) {
            const div = document.createElement('div');
            const x = i % 3, y = Math.floor(i / 3);
            div.className = `cell ${(x + y) % 2 === 0 ? 'light' : 'dark'}`;
            div.onclick = () => this.handleInput(i);
            div.onmouseenter = () => { this.hoveredNodeIdx = i; };
            div.onmouseleave = () => { this.hoveredNodeIdx = -1; };
            this.boardEl.appendChild(div);
            this.cells.push(div);
        }
    }

    updateVisuals() {
        this.cells.forEach((cell, i) => {
            // Reset classes but keep light/dark
            const base = (i%3 + Math.floor(i/3)) % 2 === 0 ? 'light' : 'dark';
            cell.className = `cell ${base}`;
            cell.innerHTML = '';

            if (i === this.hoveredNodeIdx) cell.style.outline = `3px solid ${this.colors.blue}`;
            else cell.style.outline = '';

            // Pieces
            if (this.grid[i] === 'W') {
                cell.innerHTML = `<span style="color:#ffffff;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000">♘</span>`;
            } else if (this.grid[i] === 'B') {
                cell.innerHTML = `<span style="color:#111111;">♞</span>`;
            } else if (i === 4) {
                cell.innerHTML = `<span style="font-size:0.5em;opacity:0.25;font-family:monospace">×</span>`;
            }

            if (i === this.selectedIdx) cell.classList.add('selected');
            if (this.validMoves.includes(i)) cell.classList.add('valid-move');
        });
    }

    checkWin() {
        if (this.grid[6]==='W' && this.grid[8]==='W' &&
            this.grid[0]==='B' && this.grid[2]==='B') {
            setTimeout(() => {
                document.getElementById('win-modal').style.display = 'flex';
            }, 250);
        }
    }

    resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.canvas.width  = rect.width  * dpr;
        this.canvas.height = rect.height * dpr;
        this.canvas.style.width  = `${rect.width}px`;
        this.canvas.style.height = `${rect.height}px`;
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        this.logicalW = rect.width;
        this.logicalH = rect.height;
        this.initGraphNodes();
    }

    initGraphNodes() {
        const W = this.logicalW, H = this.logicalH;
        if (!W || !H) return;
        // label strip at top = ~30px, bottom 10px
        const cx = W / 2;
        const cy = (H + 30) / 2;
        const minDim = Math.min(W, H - 30);
        const radius    = minDim * 0.36;
        const nodeR     = Math.max(14, Math.min(28, minDim * 0.075));
        const centerR   = Math.max(11, Math.min(22, minDim * 0.055));

        // Cycle order around the octagon
        const cycleOrder = [0, 5, 6, 1, 8, 3, 2, 7];

        this.nodes = [];
        cycleOrder.forEach((id, i) => {
            const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
            this.nodes.push({ id, x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius, r: nodeR });
        });
        // Centre node (4 = blocked square)
        this.nodes.push({ id: 4, x: cx, y: cy, r: centerR });
        this.nodes.sort((a, b) => a.id - b.id);
    }

    handleCanvasClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        for (const n of this.nodes) {
            if (Math.hypot(x - n.x, y - n.y) < n.r + 6) { this.handleInput(n.id); return; }
        }
    }

    handleCanvasHover(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        let found = -1;
        for (const n of this.nodes) {
            if (Math.hypot(x - n.x, y - n.y) < n.r + 4) { found = n.id; break; }
        }
        if (found !== this.hoveredNodeIdx) {
            this.hoveredNodeIdx = found;
            this.updateVisuals();
        }
    }

    loop() {
        const W = this.logicalW, H = this.logicalH;
        this.ctx.clearRect(0, 0, W, H);
        if (!W || !H || !this.nodes.length) { requestAnimationFrame(() => this.loop()); return; }
        this.drawEdges();
        this.drawNodes();
        requestAnimationFrame(() => this.loop());
    }

    drawEdges() {
        this.ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        this.ctx.lineWidth = 1.5;
        this.ctx.lineCap = 'round';
        this.edges.forEach(e => {
            const n1 = this.nodes.find(n => n.id === e.source);
            const n2 = this.nodes.find(n => n.id === e.target);
            if (!n1 || !n2) return;

            // Highlight edge if both endpoints are selected/valid
            const connected = (n1.id === this.selectedIdx && this.validMoves.includes(n2.id)) ||
                              (n2.id === this.selectedIdx && this.validMoves.includes(n1.id));
            if (connected) {
                this.ctx.strokeStyle = `rgba(21,101,192,0.5)`;
                this.ctx.lineWidth = 2.5;
            } else {
                this.ctx.strokeStyle = 'rgba(0,0,0,0.13)';
                this.ctx.lineWidth = 1.5;
            }
            this.ctx.beginPath();
            this.ctx.moveTo(n1.x, n1.y);
            this.ctx.lineTo(n2.x, n2.y);
            this.ctx.stroke();
        });
    }

    drawNodes() {
        this.nodes.forEach(n => {
            const i = n.id;
            const piece     = this.grid[i];
            const isHover   = i === this.hoveredNodeIdx;
            const isSelected= i === this.selectedIdx;
            const isValid   = this.validMoves.includes(i);

            // Background fill
            this.ctx.beginPath();
            this.ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);

            let fill = this.colors.lightGray;
            if (isSelected) fill = 'rgba(21,101,192,0.2)';
            else if (isValid) fill = 'rgba(21,101,192,0.12)';
            else if (isHover) fill = this.colors.white;
            this.ctx.fillStyle = fill;
            this.ctx.fill();

            // Border ring
            let stroke = 'rgba(0,0,0,0.25)', lw = 1.5;
            if (isSelected) { stroke = this.colors.blue; lw = 3; }
            else if (isValid) { stroke = this.colors.blue; lw = 2.5; }
            else if (this.whiteGoal.includes(i)) { stroke = this.colors.red; lw = 3; }
            else if (this.blackGoal.includes(i)) { stroke = this.colors.blue; lw = 3; }
            else if (isHover) { stroke = this.colors.black; lw = 2; }

            this.ctx.strokeStyle = stroke;
            this.ctx.lineWidth = lw;
            this.ctx.stroke();

            // Valid move dot
            if (isValid && !piece) {
                this.ctx.beginPath();
                this.ctx.arc(n.x, n.y, n.r * 0.3, 0, Math.PI * 2);
                this.ctx.fillStyle = `rgba(21,101,192,0.5)`;
                this.ctx.fill();
            }

            // Text / piece
            this.ctx.textAlign = 'center';
            this.ctx.textBaseline = 'middle';
            if (piece) {
                this.ctx.font = `${Math.floor(n.r * 1.3)}px Arial`;
                if (piece === 'W') {
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.shadowColor = 'rgba(0,0,0,0.9)';
                    this.ctx.shadowBlur = 2;
                } else {
                    this.ctx.fillStyle = this.colors.black;
                    this.ctx.shadowBlur = 0;
                }
                this.ctx.fillText(piece === 'W' ? '♘' : '♞', n.x, n.y + n.r * 0.08);
                this.ctx.shadowBlur = 0;
            } else if (i === 4) {
                this.ctx.font = `${Math.floor(n.r * 0.55)}px Roboto Mono, monospace`;
                this.ctx.fillStyle = 'rgba(0,0,0,0.25)';
                this.ctx.fillText('×', n.x, n.y);
            } else {
                this.ctx.font = `${Math.floor(n.r * 0.5)}px Architects Daughter, cursive`;
                this.ctx.fillStyle = 'rgba(0,0,0,0.4)';
                this.ctx.fillText(i, n.x, n.y);
            }
        });
    }
}

const game = new KnightGame();
</script>
</body>
</html>
